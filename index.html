  <!-- Critical CSS: prevent layout shift on first paint -->
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{background:#020409}
    [data-theme="light"]{background:#f5f6fa}
    body{background:#020409;color:#f1f5f9;font-family:'Inter',system-ui,sans-serif;min-height:100dvh;overflow-x:hidden}
    [data-theme="light"] body{background:#f5f6fa;color:#0f172a}
    #root{min-height:100dvh;background:inherit}
    .skip-link{position:absolute;left:-9999px;top:4px;z-index:99999;padding:8px 16px;background:#22d3ee;color:#020409;font-weight:600;border-radius:4px;text-decoration:none;font-size:14px}
    .skip-link:focus{left:4px}
    /* Spinner shown during Suspense fallback */
    .spinner{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,.1);border-top-color:#22d3ee;animation:spin .7s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>
  <!-- Prevent theme flash before JS loads -->
  <script>
    (function(){
      var t=localStorage.getItem('np-theme')||
        (window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');
      document.documentElement.setAttribute('data-theme',t);
    })();
